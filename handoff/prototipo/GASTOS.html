<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>GASTOS — Control de gastos personales</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app/styles.css" />
<style>
/* ---------- responsive ---------- */
@media (max-width: 980px) {
  :root { --sidebar-w: 0px; }
  .sidebar { display: none !important; }
  .mobile-nav { display: flex !important; }
  .mobile-logo { display: block !important; }
  .topbar-title { display: none !important; }
  .more-btn { display: block !important; }
  .theme-btn { display: inline-flex !important; }
  .user-name { display: none !important; }
  .dash-charts { grid-template-columns: 1fr !important; }
  main { padding: 16px !important; }
  .topbar { padding: 11px 14px !important; }
}
@media (max-width: 760px) {
  .auth-grid { grid-template-columns: 1fr !important; }
  .auth-aside { display: none !important; }
  .auth-logo-mobile { display: block !important; }
  .reg-grid { grid-template-columns: 1fr !important; }
}
@media (max-width: 560px) {
  .h-page { font-size: 22px !important; }
}
/* print: only show report main when printing */
@media print {
  .sidebar, .topbar, .mobile-nav, .more-btn { display: none !important; }
  main { padding: 0 !important; }
  body { background: #fff; }
}
</style>
</head>
<body>
<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<!-- app modules -->
<script type="text/babel" src="app/icons.jsx"></script>
<script type="text/babel" src="app/data.jsx"></script>
<script type="text/babel" src="app/ui.jsx"></script>
<script type="text/babel" src="app/auth.jsx"></script>
<script type="text/babel" src="app/screen_dashboard.jsx"></script>
<script type="text/babel" src="app/screen_register.jsx"></script>
<script type="text/babel" src="app/screen_history.jsx"></script>
<script type="text/babel" src="app/screen_budget.jsx"></script>
<script type="text/babel" src="app/screen_cash.jsx"></script>
<script type="text/babel" src="app/screen_yape.jsx"></script>
<script type="text/babel" src="app/screen_reports.jsx"></script>
<script type="text/babel" src="app/screen_gamification.jsx"></script>
<script type="text/babel" src="app/app.jsx"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.GastosApp) { setTimeout(mount, 40); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<window.GastosApp />);
  };
  mount();
</script>
</body>
</html>
